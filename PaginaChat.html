<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Página do Chat</title>
    <link rel="stylesheet" href="style.css" />
    <script src="Chat.js" defer></script>
</head>
<body>
    <div id="menu">
        <h2 id="menuText">Menu</h2>
        <ul id="menuList">
            <p id="BotaoChats" type="button">Histórico</p>
            <p id="Historico"></p>
            <p id="Configuracoes" type="button">Configurações</p>
            <p id="Ajuda" type="button">Ajuda</p>
        </ul>
    </div>

    <div id="background">
        <div id="chat-container">
                    <div id="welcomeMessage">
        <h1>Bem-vindo ao Chat de Suporte Emocional</h1>
        <p>Como você está se sentindo hoje?</p>
    </div>
            <div id="messages"></div>
            <form id="chat-form" autocomplete="off" class="input-container">
                
    <input type="text" id="user-input" placeholder="Digite sua mensagem..." />
    <button type="submit" id="send-button">Enviar</button>
</form>
        </div>
    </div>
</body>
</html>
